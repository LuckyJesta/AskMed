### model
model_name_or_path: models/Qwen3-4B-Instruct-2507
template: qwen3_nothink
flash_attn: sdpa
trust_remote_code: true

### method
stage: sft
do_train: true
do_eval: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: meddg_extractor_prompt_v2_5_30k_terminology_train
eval_dataset: meddg_extractor_prompt_v2_5_30k_terminology_valid
dataset_dir: data
cutoff_len: 8192
train_on_prompt: false
packing: false
overwrite_cache: false
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: outputs/extractor_qwen3_4b/train_terminology_v2_5_30k
logging_first_step: true
logging_steps: 10
disable_tqdm: false
include_num_input_tokens_seen: true
save_strategy: steps
save_steps: 250
save_total_limit: 3
plot_loss: true
report_to: tensorboard
save_only_model: false

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 250
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
