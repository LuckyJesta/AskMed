### model
model_name_or_path: models/Qwen3-4B-Instruct-2507
adapter_name_or_path: outputs/extractor_qwen3_4b/train
template: qwen3_nothink
flash_attn: sdpa
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
eval_dataset: meddg_extractor_test
dataset_dir: data
cutoff_len: 8192
overwrite_cache: false
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: outputs/extractor_qwen3_4b/test
overwrite_output_dir: true
logging_steps: 10
disable_tqdm: false
report_to: none

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
bf16: true
ddp_timeout: 180000000

### generation
do_sample: false
max_new_tokens: 4096
